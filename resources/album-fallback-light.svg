<svg xmlns="http://www.w3.org/2000/svg"
     width="512" height="512" viewBox="0 0 512 512"
     role="img" aria-label="Album art placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f5f5"/>
    </linearGradient>
    <linearGradient id="frameFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f3f3"/>
      <stop offset="1" stop-color="#eeeeee"/>
    </linearGradient>
    <linearGradient id="sleeveFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c5c5c5"/>
      <stop offset="1" stop-color="#a8a8a8"/>
    </linearGradient>
    <linearGradient id="recordFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4c4c4"/>
      <stop offset="1" stop-color="#ababab"/>
    </linearGradient>
    <clipPath id="recordClip">
      <rect x="301" y="176" width="74" height="160"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <rect x="36" y="44" width="440" height="424" rx="11"
        fill="url(#frameFill)"
        stroke="#cfcfcf" stroke-width="2"/>

  <g aria-hidden="true">
    <!-- Record, mostly hidden behind the sleeve. -->
    <g clip-path="url(#recordClip)">
      <circle cx="288" cy="255" r="67" fill="url(#recordFill)"/>
      <circle cx="288" cy="255" r="24" fill="#f4f4f4"/>
      <g fill="none" stroke="#d7d7d7" stroke-width="0.75" opacity="0.72">
        <circle cx="288" cy="255" r="35"/>
        <circle cx="288" cy="255" r="41"/>
        <circle cx="288" cy="255" r="47"/>
        <circle cx="288" cy="255" r="53"/>
        <circle cx="288" cy="255" r="59"/>
      </g>
    </g>

    <!-- Front sleeve. -->
    <rect x="166" y="184" width="135" height="142" rx="7"
          fill="url(#sleeveFill)"/>

    <!-- Sleeve cutout. -->
    <circle cx="234" cy="255" r="29" fill="#f4f4f4"/>
    <circle cx="234" cy="255" r="10" fill="#b2b2b2"/>
  </g>
</svg>
