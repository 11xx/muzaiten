<svg xmlns="http://www.w3.org/2000/svg"
     width="512" height="512" viewBox="0 0 512 512"
     role="img" aria-label="Album art placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="1" stop-color="#202020"/>
    </linearGradient>
    <linearGradient id="frameFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="1" stop-color="#252525"/>
    </linearGradient>
    <linearGradient id="sleeveFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d6d6d6"/>
      <stop offset="1" stop-color="#bdbdbd"/>
    </linearGradient>
    <linearGradient id="recordFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d0d0d0"/>
      <stop offset="1" stop-color="#b9b9b9"/>
    </linearGradient>
    <clipPath id="recordClip">
      <rect x="301" y="176" width="74" height="160"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <rect x="36" y="44" width="440" height="424" rx="11"
        fill="url(#frameFill)"
        stroke="#626262" stroke-width="2"/>

  <g aria-hidden="true">
    <!-- Record, mostly hidden behind the sleeve. -->
    <g clip-path="url(#recordClip)">
      <circle cx="288" cy="255" r="67" fill="url(#recordFill)"/>
      <circle cx="288" cy="255" r="24" fill="#252525"/>
      <g fill="none" stroke="#868686" stroke-width="0.75" opacity="0.82">
        <circle cx="288" cy="255" r="35"/>
        <circle cx="288" cy="255" r="41"/>
        <circle cx="288" cy="255" r="47"/>
        <circle cx="288" cy="255" r="53"/>
        <circle cx="288" cy="255" r="59"/>
      </g>
    </g>

    <!-- Front sleeve. -->
    <rect x="166" y="184" width="135" height="142" rx="7"
          fill="url(#sleeveFill)"/>

    <!-- Sleeve cutout. -->
    <circle cx="234" cy="255" r="29" fill="#252525"/>
    <circle cx="234" cy="255" r="10" fill="#c9c9c9"/>
  </g>
</svg>
