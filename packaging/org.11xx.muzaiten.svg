<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <title>muzaiten</title>
  <desc>Benzaiten's biwa with a halo, floating on the sea under a night sky.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d3779"/>
      <stop offset="0.55" stop-color="#221f51"/>
      <stop offset="1" stop-color="#131135"/>
    </linearGradient>
    <linearGradient id="lute" x1="0.3" y1="0" x2="0.75" y2="1">
      <stop offset="0" stop-color="#ffdf7e"/>
      <stop offset="0.55" stop-color="#eeab3f"/>
      <stop offset="1" stop-color="#a96a18"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a4a1e"/>
      <stop offset="1" stop-color="#3a1d08"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.35" cy="0.22" r="0.65">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frame">
      <rect x="4" y="4" width="120" height="120" rx="26"/>
    </clipPath>
  </defs>

  <!-- night sky -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#cfe0ff">
    <circle cx="14" cy="20" r="1.2" opacity="0.7"/>
    <circle cx="108" cy="20" r="1.6" opacity="0.9"/>
    <circle cx="117" cy="52" r="1.2" opacity="0.6"/>
    <circle cx="18" cy="74" r="1.3" opacity="0.6"/>
  </g>
  <path d="M23 29 C 24 34 26 36 31 37 C 26 38 24 40 23 45 C 22 40 20 38 15 37 C 20 36 22 34 23 29 Z" fill="#ffe9b0" opacity="0.95"/>
  <path d="M111 69 C 111.6 72 112.8 73.2 115.8 73.8 C 112.8 74.4 111.6 75.6 111 78.6 C 110.4 75.6 109.2 74.4 106.2 73.8 C 109.2 73.2 110.4 72 111 69 Z" fill="#cfe0ff" opacity="0.85"/>

  <!-- goddess halo / moon behind the biwa -->
  <circle cx="56" cy="52" r="32" fill="#45407f" opacity="0.5"/>
  <circle cx="56" cy="52" r="32" fill="none" stroke="#ffd98a" stroke-width="2" opacity="0.35"/>

  <!-- mitsudomoe: Benzaiten's shrine crest (taiko drum mark / water swirl) -->
  <g transform="translate(104 36)" fill="#ffd98a" opacity="0.95">
    <path d="M 0 -10.5 A 10.5 10.5 0 0 1 9.52 4.44 A 5.6 5.6 0 0 0 0.1 0 L 0 -1.65 A 3.6 3.6 0 1 1 0 -8.85 Z"/>
    <path d="M 0 -10.5 A 10.5 10.5 0 0 1 9.52 4.44 A 5.6 5.6 0 0 0 0.1 0 L 0 -1.65 A 3.6 3.6 0 1 1 0 -8.85 Z" transform="rotate(120)"/>
    <path d="M 0 -10.5 A 10.5 10.5 0 0 1 9.52 4.44 A 5.6 5.6 0 0 0 0.1 0 L 0 -1.65 A 3.6 3.6 0 1 1 0 -8.85 Z" transform="rotate(240)"/>
  </g>

  <!-- Benzaiten's sea -->
  <g clip-path="url(#frame)">
    <path d="M4 101 C 24 92 40 110 64 102 C 88 94 104 112 124 100 L 124 124 L 4 124 Z" fill="#24406e"/>
    <path d="M4 101 C 24 92 40 110 64 102 C 88 94 104 112 124 100" fill="none" stroke="#5d86b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M4 112 C 28 100 48 118 72 110 C 94 103 110 118 124 110 L 124 124 L 4 124 Z" fill="#2f6f9e"/>
    <path d="M4 112 C 28 100 48 118 72 110 C 94 103 110 118 124 110" fill="none" stroke="#b9e7f7" stroke-width="3" stroke-linecap="round"/>
    <g fill="#b9e7f7" opacity="0.8">
      <circle cx="22" cy="104" r="1.8"/>
      <circle cx="80" cy="103" r="1.5"/>
      <circle cx="104" cy="107" r="1.8"/>
    </g>
    <ellipse cx="70" cy="115" rx="27" ry="5.5" fill="#0d1530" opacity="0.35"/>
  </g>

  <!-- the biwa -->
  <g transform="rotate(-12 64 78)" stroke-linejoin="round">
    <!-- neck -->
    <rect x="58.5" y="22" width="11" height="32" rx="2.5" fill="url(#wood)" stroke="#191033" stroke-width="3"/>
    <!-- bent-back pegbox, 4 staggered lateral pegs (2 per side) -->
    <g transform="translate(64 25) rotate(-58)">
      <g fill="#a9712a" stroke="#191033" stroke-width="2.5">
        <rect x="-13" y="-23" width="10" height="4.4" rx="2.2"/>
        <rect x="-13" y="-12.5" width="10" height="4.4" rx="2.2"/>
        <rect x="3" y="-18" width="10" height="4.4" rx="2.2"/>
        <rect x="3" y="-7.5" width="10" height="4.4" rx="2.2"/>
      </g>
      <rect x="-5.5" y="-28" width="11" height="30" rx="4" fill="url(#wood)" stroke="#191033" stroke-width="3"/>
    </g>
    <!-- body -->
    <path d="M64 46 C 82 50 95 68 95 88 C 95 107 82 119 64 119 C 46 119 33 107 33 88 C 33 68 46 50 64 46 Z" fill="url(#lute)" stroke="#191033" stroke-width="3"/>
    <path d="M64 46 C 82 50 95 68 95 88 C 95 107 82 119 64 119 C 46 119 33 107 33 88 C 33 68 46 50 64 46 Z" fill="url(#shine)"/>
    <!-- nut + frets -->
    <rect x="58.5" y="26.5" width="11" height="2.6" rx="1.3" fill="#f0e0b8"/>
    <g fill="#b07a38">
      <rect x="58.5" y="36" width="11" height="2.2" rx="1.1"/>
      <rect x="58.5" y="44" width="11" height="2.2" rx="1.1"/>
    </g>
    <!-- crescent moon sound hole -->
    <path transform="rotate(-30 50 76)" d="M50 69 A 7 7 0 1 0 50 83 A 8.75 8.75 0 0 1 50 69 Z" fill="#191033"/>
    <!-- 4 strings -->
    <g stroke="#fff3d0" stroke-width="1.5" stroke-linecap="round" opacity="0.95">
      <line x1="60.2" y1="29" x2="59.5" y2="105"/>
      <line x1="62.8" y1="29" x2="62.5" y2="105"/>
      <line x1="65.4" y1="29" x2="65.5" y2="105"/>
      <line x1="68" y1="29" x2="68.5" y2="105"/>
    </g>
    <!-- tailpiece -->
    <rect x="57" y="103" width="14" height="8.5" rx="2.5" fill="#e0492c" stroke="#191033" stroke-width="2.5"/>
  </g>

  <!-- subtle inner rim -->
  <rect x="5.25" y="5.25" width="117.5" height="117.5" rx="24.75" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.07"/>
</svg>
