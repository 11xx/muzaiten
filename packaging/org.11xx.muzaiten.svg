<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <title>muzaiten</title>
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c5478"/>
      <stop offset="0.6" stop-color="#163658"/>
      <stop offset="1" stop-color="#0a1f38"/>
    </linearGradient>
    <linearGradient id="lute" x1="0.25" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#fce5a3"/>
      <stop offset="0.55" stop-color="#e6b13c"/>
      <stop offset="1" stop-color="#9a5e10"/>
    </linearGradient>
    <linearGradient id="neck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5e2f10"/>
      <stop offset="1" stop-color="#321904"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.32" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Benzaiten's sea / night sky -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#sea)"/>

  <!-- distant water ripples (goddess of water) -->
  <g stroke="#88c8df" fill="none" stroke-linecap="round" opacity="0.22">
    <path d="M14 100 Q 26 95 38 100 T 62 100 T 86 100 T 114 100" stroke-width="1.4"/>
    <path d="M14 108 Q 26 103 38 108 T 62 108 T 86 108 T 114 108" stroke-width="1.4"/>
    <path d="M14 116 Q 26 111 38 116 T 62 116 T 86 116 T 114 116" stroke-width="1.4"/>
  </g>

  <!-- music: sound waves flanking the biwa body -->
  <g fill="none" stroke="#a0e3f0" stroke-linecap="round">
    <path d="M30 76 Q 20 90 30 104" stroke-width="3" opacity="0.85"/>
    <path d="M20 66 Q 4 90 20 114" stroke-width="3" opacity="0.5"/>
    <path d="M98 76 Q 108 90 98 104" stroke-width="3" opacity="0.85"/>
    <path d="M108 66 Q 124 90 108 114" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- biwa (Benzaiten's lute) -->
  <g transform="rotate(-12 64 66)">
    <rect x="55" y="14" width="18" height="10" rx="2.5" fill="url(#neck)"/>
    <g fill="#150802">
      <circle cx="59" cy="19" r="1.7"/>
      <circle cx="63" cy="19" r="1.7"/>
      <circle cx="67" cy="19" r="1.7"/>
      <circle cx="71" cy="19" r="1.7"/>
    </g>
    <rect x="60" y="24" width="8" height="40" rx="2" fill="url(#neck)"/>
    <path d="M 64 58
             C 80 58 90 70 91 84
             C 92 100 84 114 64 114
             C 44 114 36 100 37 84
             C 38 70 48 58 64 58 Z"
          fill="url(#lute)" stroke="#3d1f08" stroke-width="0.7"/>
    <path d="M 64 58
             C 80 58 90 70 91 84
             C 92 100 84 114 64 114
             C 44 114 36 100 37 84
             C 38 70 48 58 64 58 Z"
          fill="url(#shine)"/>
    <g stroke="#fff5d4" stroke-width="0.7" opacity="0.9">
      <line x1="60" y1="24" x2="51" y2="108"/>
      <line x1="62.5" y1="24" x2="58" y2="110"/>
      <line x1="65.5" y1="24" x2="70" y2="110"/>
      <line x1="68" y1="24" x2="77" y2="108"/>
    </g>
    <rect x="50" y="106" width="28" height="3" rx="1" fill="#321904"/>
    <circle cx="64" cy="86" r="5.2" fill="#0a1f38"/>
    <circle cx="64" cy="86" r="3" fill="#e04428"/>
  </g>
</svg>
